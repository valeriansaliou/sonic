[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "MPL-2.0",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8
exceptions = []

[advisories]
maximum-db-staleness = "P2W"
unmaintained = "all"
yanked = "deny"
ignore = [
    { id = "RUSTSEC-2020-0077", reason = "`memmap` is unmaintained, but `fst` still depends on it and we can’t just bump" },
    { id = "RUSTSEC-2024-0436", reason = "`paste` is unmaintained, not insecure" },
    { id = "RUSTSEC-2026-0173", reason = "`proc-macro-error2` is unmaintained, not insecure" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
workspace-default-features = "allow"
external-default-features = "allow"
deny = [
    { crate = "openssl", use-instead = "rustls" },
    { crate = "openssl-sys", use-instead = "rustls" },
    { crate = "libssh2-sys", reason = "reduce supply-chain exposure" },
    { crate = "windows", reason = "bloated and unnecessary", use-instead = "ideally inline bindings; practically, windows-sys" },
]

[bans.build]
# WARN: Before updating this list, e.g. when bumping deps, you should have a
#   look at what has changed in the build script (to reduce the risk of
#   supply-chain attack).
allow-build-scripts = [
    "ahash@0.8.12",
    "alloca@0.4.0",
    "bindgen@0.72.1",
    "bzip2-sys@0.1.13+1.0.8",
    "clang-sys@1.8.1",
    "crc32fast@1.5.0",
    "crossbeam-utils@0.8.22",
    "crunchy@0.2.4",
    "flatbuffers@25.12.19",
    "getrandom@0.3.4",
    "getrandom@0.4.3",
    "iana-time-zone-haiku@0.1.2",
    "icu_normalizer_data@2.2.0",
    "icu_properties_data@2.2.0",
    "libc@0.2.186",
    "libm@0.2.16",
    "librocksdb-sys@0.17.3+10.4.2",
    "libz-sys@1.1.29",
    "lz4-sys@1.11.1+lz4-1.10.0",
    "nix@0.31.3",
    "num-traits@0.2.19",
    "paste@1.0.15",
    "portable-atomic@1.14.0",
    "proc-macro2@1.0.106",
    "quote@1.0.46",
    "ring@0.17.14",
    "rustls@0.23.41",
    "rustversion@1.0.23",
    "serde@1.0.228",
    "serde_core@1.0.228",
    "serde_json@1.0.150",
    "snap@1.1.1",
    "thiserror@2.0.19",
    "tikv-jemalloc-sys@0.7.1+5.3.1-0-g81034ce1f1373e37dc865038e1bc8eeecf559ce8",
    "tiny-keccak@2.0.2",
    "wasm-bindgen-shared@0.2.126",
    "wasm-bindgen@0.2.126",
    "winapi-i686-pc-windows-gnu@0.4.0",
    "winapi-x86_64-pc-windows-gnu@0.4.0",
    "winapi@0.3.9",
    "windows_aarch64_gnullvm@0.52.6",
    "windows_aarch64_gnullvm@0.53.1",
    "windows_aarch64_msvc@0.52.6",
    "windows_aarch64_msvc@0.53.1",
    "windows_i686_gnu@0.52.6",
    "windows_i686_gnu@0.53.1",
    "windows_i686_gnullvm@0.52.6",
    "windows_i686_gnullvm@0.53.1",
    "windows_i686_msvc@0.52.6",
    "windows_i686_msvc@0.53.1",
    "windows_x86_64_gnu@0.52.6",
    "windows_x86_64_gnu@0.53.1",
    "windows_x86_64_gnullvm@0.52.6",
    "windows_x86_64_gnullvm@0.53.1",
    "windows_x86_64_msvc@0.52.6",
    "windows_x86_64_msvc@0.53.1",
    "wit-bindgen@0.51.0",
    "wit-bindgen@0.57.1",
    "zerocopy@0.8.54",
    "zmij@1.0.21",
    "zstd-safe@7.2.4",
    "zstd-sys@2.0.16+zstd.1.5.7",
]
executables = "allow"
interpreted = "allow"
script-extensions = []
enable-builtin-globs = false
include-dependencies = false
include-workspace = false
include-archives = false

[sources]
unknown-registry = "deny"
unknown-git = "deny"
required-git-spec = "rev"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
