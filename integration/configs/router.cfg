# Sonic router integration test cluster
# One sonic-router in front of 5 sonic-server backends, all on fixed local ports.
# Backends themselves reuse the repository's root config.cfg via env var overrides
# (see cluster.sh), so there is nothing to duplicate here for them.

[server]
log_level = "info"

[channel]
inet = "127.0.0.1:19100"
tcp_timeout = 300
bulk_buffer_size = 8388608
auth_password = "RouterPassword"

[admin]
inet = "127.0.0.1:19101"
auth_password = "RouterAdminPassword"

[directory]
path = "./data/router/directory.db"

[[servers]]
id = "sonic-0"
address = "127.0.0.1:19110"
auth_password = "SecretPassword"
status = "active"
weight = 1

[[servers]]
id = "sonic-1"
address = "127.0.0.1:19111"
auth_password = "SecretPassword"
status = "active"
weight = 1

[[servers]]
id = "sonic-2"
address = "127.0.0.1:19112"
auth_password = "SecretPassword"
status = "active"
weight = 1

[[servers]]
id = "sonic-3"
address = "127.0.0.1:19113"
auth_password = "SecretPassword"
status = "active"
weight = 1

[[servers]]
id = "sonic-4"
address = "127.0.0.1:19114"
auth_password = "SecretPassword"
status = "active"
weight = 1
