# Sonic Router

[server]
log_level = "info"

[channel]
inet = "[::1]:1490"
tcp_timeout = 300
bulk_buffer_size = 8388608
auth_password = "SecretPassword"

[admin]
inet = "[::1]:1492"
auth_password = "RouterAdminPassword"

[directory]
path = "./data/router/directory.db"

[[servers]]
id = "sonic-0"
# Kubernetes DNS names are accepted and the file is reloaded every two seconds.
address = "[::1]:1491"
auth_password = "SecretPassword"
# active routes all traffic, draining rejects new buckets, offline rejects all traffic.
status = "active"
weight = 1
